name: Diagnose agent validation

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and validate pull request tree
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir repo
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o repo.tar.gz
          tar -xzf repo.tar.gz -C repo --strip-components=1
          cd repo
          printf '%s\n' '=== AGENT FILES ==='
          find agents -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sort
          printf '%s\n' '=== VALIDATION ==='
          bash scripts/validate-agent-configs.sh
