name: OpenCode patch compatibility

on:
  workflow_dispatch:
    inputs:
      opencode_ref:
        description: OpenCode branch, tag, or commit to test
        required: false
        default: dev
  schedule:
    - cron: '23 6 * * 1'

permissions:
  contents: read

jobs:
  compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OPENCODE_REF: ${{ inputs.opencode_ref || 'dev' }}
    steps:
      - name: Check out agent loop
        uses: actions/checkout@v4

      - name: Check out OpenCode
        uses: actions/checkout@v4
        with:
          repository: anomalyco/opencode
          ref: ${{ env.OPENCODE_REF }}
          path: upstream-opencode
          fetch-depth: 1

      - name: Verify patch applies
        working-directory: upstream-opencode
        run: git apply --check ../patches/opencode-subagent-failure-exposure.patch

      - name: Apply patch
        working-directory: upstream-opencode
        run: git apply ../patches/opencode-subagent-failure-exposure.patch

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install upstream dependencies
        working-directory: upstream-opencode
        run: bun install --frozen-lockfile

      - name: Build standalone OpenCode
        working-directory: upstream-opencode
        run: bun ./packages/opencode/script/build.ts --single

      - name: Verify patched source contracts
        run: node scripts/check-opencode-patch-contract.mjs upstream-opencode

      - name: Record tested revision
        if: always()
        run: |
          git -C upstream-opencode rev-parse HEAD > opencode-tested-revision.txt
          printf 'ref=%s\n' "$OPENCODE_REF" >> opencode-tested-revision.txt

      - name: Upload compatibility evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencode-patch-compatibility
          path: opencode-tested-revision.txt
