name: Apply budget post-merge audit fix

on:
  push:
    branches:
      - fix/budget-post-merge-audit

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/budget-post-merge-audit

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply audit fixes
        run: node scripts/apply-budget-audit-fixes.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Commit fixes
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: handle local and trailing usage budget events"
          git push origin HEAD:fix/budget-post-merge-audit
