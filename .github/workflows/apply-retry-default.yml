name: Apply configured retry defaults

on:
  push:
    branches: [release/v0.2.0-reliability]

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v0.2.0-reliability
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply retry defaults
        run: node scripts/apply-retry-default.mjs
      - name: Install dependencies
        run: npm ci
      - name: Validate
        run: npm run validate
      - name: Commit changes
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix: use configured retry defaults"
          git push origin HEAD:release/v0.2.0-reliability
